services:
  kshrd-booking-room:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    container_name: kshrd-booking-room
    restart: unless-stopped
    ports:
      - "127.0.0.1:9999:3000"
    volumes:
      # Persist auth.db, bookings.db, and legacy bookings.json on the host
      - ./data:/app/data
